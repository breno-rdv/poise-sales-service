quarkus.grpc.server.use-separate-server=false

# Datasource — DevServices auto-starts PostgreSQL in dev/test when no URL is set
quarkus.datasource.db-kind=postgresql

# Hibernate Reactive
quarkus.hibernate-orm.database.generation=none

# Flyway
quarkus.flyway.migrate-at-start=true

# Kafka — DevServices auto-starts a broker in dev/test when no bootstrap-servers is set
mp.messaging.outgoing.sales-commands.connector=smallrye-kafka
mp.messaging.outgoing.sales-commands.topic=sales.commands
mp.messaging.outgoing.sales-commands.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
